name: Process Place Suggestion

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to reprocess'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-place:
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.labels.*.name, 'place-suggestion')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Resolve issue number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch issue body (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ steps.resolve.outputs.issue_number }} \
            --jq '.body' > /tmp/issue_body.md

      - name: Persist issue body (issues event)
        if: github.event_name != 'workflow_dispatch'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          Path('/tmp/issue_body.md').write_text(os.environ['ISSUE_BODY'], encoding='utf-8')
          PY

      - name: Process place submission
        run: |
          python scripts/process_place_submission.py \
            --issue-body-file /tmp/issue_body.md \
            --issue-number "${{ steps.resolve.outputs.issue_number }}" \
            --places-file data/places.csv

      - name: Rebuild place coordinates
        run: |
          python scripts/geocode_places.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          commit-message: "chore: ingest place suggestion #${{ steps.resolve.outputs.issue_number }}"
          title: "chore: ingest place suggestion #${{ steps.resolve.outputs.issue_number }}"
          body: |
            Automated place ingestion from issue #${{ steps.resolve.outputs.issue_number }}.

            Closes #${{ steps.resolve.outputs.issue_number }}
          branch: "automation/place-suggestion-${{ steps.resolve.outputs.issue_number }}"
